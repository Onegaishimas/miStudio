name: Build and Push Docker Images (miStudio only)

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  build:
    # HARD STOP: only run in hitsainet/miStudio
    if: github.repository == 'hitsainet/miStudio'

    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write
      attestations: write

    strategy:
      matrix:
        image:
          - name: backend
            context: ./backend
            dockerfile: ./backend/Dockerfile
            repo: hitsai/mistudio-backend
          - name: frontend
            context: ./frontend
            dockerfile: ./frontend/Dockerfile
            repo: hitsai/mistudio-frontend

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Copy LICENSE to build contexts
        run: |
          cp LICENSE backend/
          cp LICENSE frontend/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract version tag
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
            echo "tags=${{ matrix.image.repo }}:latest,${{ matrix.image.repo }}:${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "tag=latest" >> $GITHUB_OUTPUT
            echo "tags=${{ matrix.image.repo }}:latest" >> $GITHUB_OUTPUT
          fi

      - name: Build and push ${{ matrix.image.name }} image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.image.context }}
          file: ${{ matrix.image.dockerfile }}
          push: true
          tags: ${{ steps.version.outputs.tags }}
          # mode=max attaches full build step provenance (not the default
          # minimal mode), which is what Docker Scout's supply-chain
          # attestation policy checks for.
          provenance: mode=max
          sbom: true

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: index.docker.io/${{ matrix.image.repo }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
