name: Build and Push Docker Images

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  # Manual full rebuild (detect treats a dispatch as "no diff base" → all).
  workflow_dispatch: {}

jobs:
  # ── Change detection ─────────────────────────────────────────────────────
  # Build ONLY the images whose code changed in this push (same strategy as
  # the WASAT monorepo). Conservative by design: tag pushes, unknown diff
  # bases (first push / force-push), and Dockerfile/dependency changes
  # rebuild the affected image; docs/tests/manual-only changes build nothing.
  detect:
    # HARD STOP: only run in hitsainet/miStudio (public/clean mirror repo)
    if: github.repository == 'hitsainet/miStudio' || github.repository == 'hitsainet/mistudio'
    runs-on: ubuntu-latest
    outputs:
      images: ${{ steps.detect.outputs.images }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # need history to diff the push range

      - name: Detect changed images
        id: detect
        env:
          BEFORE: ${{ github.event.before }}
          REF: ${{ github.ref }}
        run: |
          set -euo pipefail
          ALL=(backend frontend)
          emit_all() { printf '%s\n' "${ALL[@]}" | jq -R . | jq -cs .; }

          # Tag push (release) → full rebuild.
          if [[ "$REF" == refs/tags/* ]]; then
            echo "images=$(emit_all)" >> "$GITHUB_OUTPUT"; echo "tag push → all"; exit 0
          fi

          # Resolve a valid diff base — this repo's main is FORCE-PUSHED by the
          # sync-to-clean workflow (source main + one filter commit), so:
          #  - BEFORE (the previous filter tip) becomes an orphaned commit that
          #    a normal fetch doesn't retrieve → fetch it explicitly by SHA
          #    (GitHub serves unadvertised objects). Diffing old filter tip →
          #    new filter tip yields exactly what changed between syncs.
          #  - A HEAD~1 fallback would be WRONG here: HEAD~1 is the unfiltered
          #    source tip, so the diff would show only the filter commit's file
          #    removals and silently skip real code changes. When BEFORE cannot
          #    be resolved, build everything instead — never silently skip.
          BASE="$BEFORE"
          if [ -n "$BASE" ] && [ "$BASE" != "0000000000000000000000000000000000000000" ]; then
            git cat-file -e "${BASE}^{commit}" 2>/dev/null \
              || git fetch --no-tags origin "$BASE" 2>/dev/null \
              || true
          fi
          if [ -z "$BASE" ] || [ "$BASE" = "0000000000000000000000000000000000000000" ] \
             || ! git cat-file -e "${BASE}^{commit}" 2>/dev/null; then
            echo "images=$(emit_all)" >> "$GITHUB_OUTPUT"; echo "no usable diff base → all"; exit 0
          fi

          CHANGED="$(git diff --name-only "$BASE" "$GITHUB_SHA")"
          echo "--- changed files ---"; echo "$CHANGED"

          declare -A pick=()
          # Backend image content: application code, Dockerfile, entrypoint,
          # Python dependency manifest, DB migrations. In miStudio the backend
          # (Dockerfile + docker-entrypoint.sh + pyproject.toml + alembic) all
          # live under backend/, so ^backend/ is the primary trigger; the
          # alternates are kept for parity in case any move to the repo root.
          if echo "$CHANGED" | grep -qE '^(backend/|Dockerfile|docker-entrypoint\.sh|pyproject\.toml|alembic)'; then
            pick[backend]=1
          fi
          # Frontend image content: everything under frontend/ (its own
          # Dockerfile, package.json, and source live there).
          if echo "$CHANGED" | grep -qE '^frontend/'; then
            pick[frontend]=1
          fi

          OUT=()
          for img in "${ALL[@]}"; do [ "${pick[$img]:-}" = "1" ] && OUT+=("$img"); done
          if [ ${#OUT[@]} -eq 0 ]; then
            echo "images=[]" >> "$GITHUB_OUTPUT"; echo "no image-affecting changes → nothing to build"
          else
            JSON="$(printf '%s\n' "${OUT[@]}" | jq -R . | jq -cs .)"
            echo "images=$JSON" >> "$GITHUB_OUTPUT"; echo "building: $JSON"
          fi

  build:
    needs: detect
    if: (github.repository == 'hitsainet/miStudio' || github.repository == 'hitsainet/mistudio') && needs.detect.outputs.images != '[]' && needs.detect.outputs.images != ''
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write
      attestations: write

    strategy:
      fail-fast: false
      matrix:
        name: ${{ fromJson(needs.detect.outputs.images) }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Resolve image build parameters
        id: img
        run: |
          case "${{ matrix.name }}" in
            backend)
              echo "repo=hitsai/mistudio-backend"     >> "$GITHUB_OUTPUT"
              echo "context=./backend"                >> "$GITHUB_OUTPUT"
              echo "dockerfile=./backend/Dockerfile"  >> "$GITHUB_OUTPUT"
              ;;
            frontend)
              echo "repo=hitsai/mistudio-frontend"      >> "$GITHUB_OUTPUT"
              echo "context=./frontend"                 >> "$GITHUB_OUTPUT"
              echo "dockerfile=./frontend/Dockerfile"   >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "ERROR: unknown image ${{ matrix.name }}"; exit 1
              ;;
          esac

      # The torch/CUDA-based backend image is large (~9 min build); reclaim
      # runner disk first.
      - name: Free disk space
        if: matrix.name == 'backend'
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache
          sudo docker system prune -af
          df -h /

      # Both images embed the Apache-2.0 LICENSE; it lives at the repo root but
      # each build context is a subdirectory, so copy it in before building.
      - name: Copy LICENSE to build context
        run: |
          cp LICENSE "${{ steps.img.outputs.context }}/"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract version tag
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
            echo "tags=${{ steps.img.outputs.repo }}:latest,${{ steps.img.outputs.repo }}:${VERSION}" >> "$GITHUB_OUTPUT"
          else
            SHA="${GITHUB_SHA::8}"
            echo "tags=${{ steps.img.outputs.repo }}:latest,${{ steps.img.outputs.repo }}:${SHA}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push ${{ matrix.name }} image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ${{ steps.img.outputs.context }}
          file: ${{ steps.img.outputs.dockerfile }}
          push: true
          tags: ${{ steps.version.outputs.tags }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
          # mode=max attaches full build step provenance (not the default
          # minimal mode), which is what Docker Scout's supply-chain
          # attestation policy checks for.
          provenance: mode=max
          sbom: true

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: index.docker.io/${{ steps.img.outputs.repo }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
