name: Sync to Clean Repository

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  sync:
    # HARD STOP: only run in Onegaishimas/miStudio
    if: github.repository == 'Onegaishimas/miStudio'

    runs-on: ubuntu-latest

    steps:
      - name: Checkout source repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main  # Always check out main branch, even when triggered by a tag

      - name: Remove excluded files and folders
        if: github.ref_type == 'branch'
        run: |
          rm -rf 0xcc/
          rm -rf .claude/
          rm -f CLAUDE.md
          rm -rf backups/
          rm -rf docs/
          rm -rf scripts/
          echo "Removed excluded files"

      - name: Commit filtered changes (including workflow updates)
        if: github.ref_type == 'branch'
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"

          git add -A

          if git diff --staged --quiet; then
            echo "No changes to sync"
            exit 0
          fi

          git commit -m "Sync from source repository (filtered)"

      - name: Push to clean repository
        env:
          SYNC_TOKEN: ${{ secrets.HITSAINET_SYNC }}
        run: |
          git config --unset-all http.https://github.com/.extraheader || true
          git config --global --unset-all http.https://github.com/.extraheader || true

          REMOTE="https://x-access-token:${SYNC_TOKEN}@github.com/hitsainet/miStudio.git"

          if [[ "${GITHUB_REF_TYPE}" == "branch" ]]; then
            git push --force "$REMOTE" main
          fi

          # Forward version tags to the clean repo
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            git push "$REMOTE" "${GITHUB_REF}"
          fi
