name: Backend Tests

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-tests.yml'
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: mistudio_test
          POSTGRES_USER: mistudio
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://mistudio:testpassword@localhost:5432/mistudio_test
      DATABASE_URL_SYNC: postgresql+psycopg2://mistudio:testpassword@localhost:5432/mistudio_test
      SECRET_KEY: ci-test-secret-key-minimum-32-characters-long
      CELERY_BROKER_URL: redis://localhost:6379/0
      CELERY_RESULT_BACKEND: redis://localhost:6379/0
      REDIS_URL: redis://localhost:6379/0
      DATA_DIR: /tmp/mistudio-ci
      HF_HOME: /tmp/mistudio-ci/huggingface_cache
      HF_CACHE_DIR: /tmp/mistudio-ci/huggingface_cache

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install PyTorch (CPU)
        run: |
          pip install torch==2.9.1 --index-url https://download.pytorch.org/whl/cpu

      - name: Install dependencies
        run: |
          # Exclude GPU-only packages that cannot install on CPU runners:
          #   triton  - CUDA compiler, Linux/GPU only
          #   bitsandbytes - quantization library, requires CUDA at runtime
          grep -vE "^(triton|bitsandbytes)==" backend/requirements.txt \
            | pip install -r /dev/stdin

      - name: Run tests
        working-directory: backend
        run: |
          python -m pytest tests/ \
            --ignore=tests/integration \
            -m "not slow" \
            -v --no-cov --tb=short
