events {
    worker_connections 1024;
}

http {
    # Use Docker DNS resolver
    resolver 127.0.0.11 valid=30s;

    # Upstream definitions using Docker service names
    upstream backend {
        server backend:8000;
    }

    upstream frontend {
        # hitsai/mistudio-frontend listens on 8080 (non-root nginx-unprivileged image)
        server frontend:8080;
    }

    # Map for WebSocket upgrade
    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    server {
        listen 80;
        server_name dkr-mistudio.hitsai.local localhost;

        client_max_body_size 100M;

        # Frontend - proxy to Vite dev server (or nginx in production)
        location / {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;

            # Vite HMR websocket timeout
            proxy_read_timeout 86400;
        }

        # Backend API
        # ORDERING NOTE: /api/internal/ MUST appear before /api/ in this file.
        # Nginx uses longest-prefix-match, so the more-specific /api/internal/
        # block takes precedence — moving it below /api/ would silently expose
        # internal Celery→backend endpoints to external callers.
        location /api/internal/ {
            deny all;
            return 403;
        }

        location /api/ {
            # CORS headers
            add_header 'Access-Control-Allow-Origin' 'http://dkr-mistudio.hitsai.local' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
            add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range' always;

            # Handle preflight requests
            if ($request_method = 'OPTIONS') {
                return 204;
            }

            proxy_pass http://backend/api/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 10800s;
            proxy_connect_timeout 75s;
            # Buffer tuning: prevents large API responses (feature activations,
            # training metrics) from being spooled to disk under load.
            proxy_buffer_size 16k;
            proxy_buffers 8 16k;
        }

        # WebSocket endpoint for Socket.IO
        location /ws/ {
            # CORS headers for WebSocket
            add_header 'Access-Control-Allow-Origin' 'http://dkr-mistudio.hitsai.local' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;

            proxy_pass http://backend/ws/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Socket.IO specific
            proxy_buffering off;
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 86400;
        }

        # Health check endpoint
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }

}
