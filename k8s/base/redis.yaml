# -------------------------
# REDIS (with persistent storage via hostPath)
# -------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: mistudio
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7
          ports:
            - containerPort: 6379
          volumeMounts:
            - name: redis-data
              mountPath: /data
      volumes:
        - name: redis-data
          hostPath:
            path: /data/mistudio/redis
            type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: mistudio
spec:
  selector:
    app: redis
  ports:
    - port: 6379
