# -------------------------
# POSTGRES (with persistent storage via hostPath)
# -------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: mistudio
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15
          env:
            - name: POSTGRES_DB
              value: mistudio
            - name: POSTGRES_USER
              value: mistudio
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mistudio-secrets
                  key: postgres-password
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-data
          hostPath:
            path: /data/mistudio/postgres
            type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: mistudio
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
