# miStudio GitOps base — deployed by the `mistudio` ArgoCD Application
# from the gitops/pilot branch.
#
# Image tags below are the *defaults*; ArgoCD Image Updater overrides them
# with digest pins via the parameter-override file `.argocd-source-mistudio.yaml`
# it commits to gitops/pilot. Never hand-edit that file on main.
#
# The hitsai/mistudio-backend entry rewrites ALL four occurrences of that image:
# the three containers in mistudio-backend (api/celery-worker/celery-beat) plus
# the mistudio-mcp deployment. So Image Updater only pins two entries and every
# backend ref moves together.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - namespace.yaml
  - postgres.yaml
  - redis.yaml
  - backend.yaml
  - mcp.yaml
  - frontend.yaml
  - ingress.yaml

images:
  - name: hitsai/mistudio-backend
    newTag: latest
  - name: hitsai/mistudio-frontend
    newTag: latest
