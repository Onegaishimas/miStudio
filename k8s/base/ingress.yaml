# -------------------------
# OLLAMA PROXY SERVICE (ExternalName to ollama namespace)
# -------------------------
apiVersion: v1
kind: Service
metadata:
  name: ollama-proxy
  namespace: mistudio
spec:
  type: ExternalName
  externalName: ollama-service.ollama.svc.cluster.local
  ports:
    - port: 11434
---
# -------------------------
# INGRESS (MICROK8S NGINX)
# -------------------------
# Note: WebSocket support requires specific annotations to handle the upgrade handshake.
# The /ws path is handled by a separate ingress to ensure clean WebSocket configuration.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mistudio-ingress
  namespace: mistudio
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "0"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "3600"
spec:
  ingressClassName: public
  rules:
    - host: k8s-mistudio.hitsai.local
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: mistudio-backend
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: mistudio-frontend
                port:
                  number: 80
    - host: k8s-mistudio.hitsai.net
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: mistudio-backend
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: mistudio-frontend
                port:
                  number: 80
---
# Separate ingress for WebSocket to ensure proper upgrade handling
# Note: websocket-services annotation handles Upgrade/Connection headers automatically
# Do NOT add configuration-snippet with Upgrade headers - it causes header duplication
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mistudio-websocket-ingress
  namespace: mistudio
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "0"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "3600"
    nginx.ingress.kubernetes.io/websocket-services: "mistudio-backend"
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
spec:
  ingressClassName: public
  rules:
    - host: k8s-mistudio.hitsai.local
      http:
        paths:
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: mistudio-backend
                port:
                  number: 8000
    - host: k8s-mistudio.hitsai.net
      http:
        paths:
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: mistudio-backend
                port:
                  number: 8000
---
# Separate ingress for Ollama with path rewrite
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mistudio-ollama-ingress
  namespace: mistudio
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    nginx.ingress.kubernetes.io/proxy-body-size: "0"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
spec:
  ingressClassName: public
  rules:
    - host: k8s-mistudio.hitsai.local
      http:
        paths:
          - path: /ollama(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: ollama-proxy
                port:
                  number: 11434
    - host: k8s-mistudio.hitsai.net
      http:
        paths:
          - path: /ollama(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: ollama-proxy
                port:
                  number: 11434
