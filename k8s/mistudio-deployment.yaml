---
apiVersion: v1
kind: Namespace
metadata:
  name: mistudio

# -------------------------
# POSTGRES (with persistent storage via hostPath)
# -------------------------
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: mistudio
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15
          env:
            - name: POSTGRES_DB
              value: mistudio
            - name: POSTGRES_USER
              value: mistudio
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mistudio-secrets
                  key: postgres-password
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-data
          hostPath:
            path: /data/mistudio/postgres
            type: DirectoryOrCreate

---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: mistudio
spec:
  selector:
    app: postgres
  ports:
    - port: 5432

# -------------------------
# REDIS (with persistent storage via hostPath)
# -------------------------
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: mistudio
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7
          ports:
            - containerPort: 6379
          volumeMounts:
            - name: redis-data
              mountPath: /data
      volumes:
        - name: redis-data
          hostPath:
            path: /data/mistudio/redis
            type: DirectoryOrCreate

---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: mistudio
spec:
  selector:
    app: redis
  ports:
    - port: 6379

# -------------------------
# BACKEND + CELERY (GPU POD)
# -------------------------
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mistudio-backend
  namespace: mistudio
spec:
  replicas: 1
  strategy:
    type: Recreate  # Required for GPU workloads - terminate old pod before starting new
  selector:
    matchLabels:
      app: mistudio-backend
  template:
    metadata:
      labels:
        app: mistudio-backend
    spec:
      # nodeSelector: Pin to a specific node if your cluster requires it.
      # Replace the hostname with your node's name, or remove this section
      # for default scheduling.
      # nodeSelector:
      #   kubernetes.io/hostname: your-gpu-node-hostname

      # hostAliases: Required if your cluster nodes cannot resolve the ingress
      # hostname via DNS. Set the IP to your ingress controller's external IP
      # and the hostname to match your ingress rule.
      # hostAliases:
      #   - ip: "YOUR_INGRESS_IP"
      #     hostnames:
      #       - "k8s-mistudio.your-domain.local"

      # Migrations run automatically via docker-entrypoint.sh for SERVICE_TYPE=api
      # The entrypoint handles: wait-for-db, alembic upgrade head, fail-on-error
      containers:
        - name: backend
          image: hitsai/mistudio-backend:latest
          ports:
            - containerPort: 8000
          # Liveness catches event-loop freezes (2026-07 incident: a blocking
          # call wedged asyncio for 37 min with the pod "Running") — restart
          # within ~60s instead of an indefinite outage. startupProbe covers
          # migrations at boot so liveness can stay tight.
          startupProbe:
            httpGet:
              path: /api/v1/system/health
              port: 8000
            periodSeconds: 10
            failureThreshold: 30   # up to 5 min for migrations/model warmup
          livenessProbe:
            httpGet:
              path: /api/v1/system/health
              port: 8000
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 4    # ~60s of unresponsiveness → restart
          readinessProbe:
            httpGet:
              path: /api/v1/system/health
              port: 8000
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          env:
            - name: SERVICE_TYPE
              value: api
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: mistudio-secrets
                  key: database-url
            - name: DATABASE_URL_SYNC
              valueFrom:
                secretKeyRef:
                  name: mistudio-secrets
                  key: database-url-sync
            - name: REDIS_URL
              value: redis://redis:6379/0
            - name: CELERY_BROKER_URL
              value: redis://redis:6379/0
            - name: CELERY_RESULT_BACKEND
              value: redis://redis:6379/0
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: mistudio-secrets
                  key: secret-key
            # Deployment portability env vars
            - name: DATA_DIR
              value: /data
            - name: BACKEND_DIR
              value: /app
            - name: INTERNAL_API_URL
              value: http://mistudio-backend:8000
            - name: OLLAMA_URL
              value: http://ollama-proxy:11434
            # Neuronpedia local instance configuration (optional - remove if not using Neuronpedia)
            # - name: NEURONPEDIA_LOCAL_DB_URL
            #   value: postgresql://neuronpedia:YOUR_NEURONPEDIA_PASSWORD@neuronpedia-postgres-service.neuronpedia:5432/neuronpedia
            # - name: NEURONPEDIA_LOCAL_URL
            #   value: http://your-neuronpedia-host.local
          resources:
            limits:
              nvidia.com/gpu: 1
          volumeMounts:
            - name: mistudio-data
              mountPath: /data

        - name: celery-worker
          image: hitsai/mistudio-backend:latest
          env:
            - name: SERVICE_TYPE
              value: celery-worker
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: mistudio-secrets
                  key: database-url
            - name: DATABASE_URL_SYNC
              valueFrom:
                secretKeyRef:
                  name: mistudio-secrets
                  key: database-url-sync
            - name: REDIS_URL
              value: redis://redis:6379/0
            - name: CELERY_BROKER_URL
              value: redis://redis:6379/0
            - name: CELERY_RESULT_BACKEND
              value: redis://redis:6379/0
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: mistudio-secrets
                  key: secret-key
            # Deployment portability env vars
            - name: DATA_DIR
              value: /data
            - name: BACKEND_DIR
              value: /app
            - name: INTERNAL_API_URL
              value: http://mistudio-backend:8000
            - name: OLLAMA_URL
              value: http://ollama-proxy:11434
            # Neuronpedia local instance configuration (optional - remove if not using Neuronpedia)
            # - name: NEURONPEDIA_LOCAL_DB_URL
            #   value: postgresql://neuronpedia:YOUR_NEURONPEDIA_PASSWORD@neuronpedia-postgres-service.neuronpedia:5432/neuronpedia
            # - name: NEURONPEDIA_LOCAL_URL
            #   value: http://your-neuronpedia-host.local
          volumeMounts:
            - name: mistudio-data
              mountPath: /data

        - name: celery-beat
          image: hitsai/mistudio-backend:latest
          env:
            - name: SERVICE_TYPE
              value: celery-beat
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: mistudio-secrets
                  key: database-url
            - name: DATABASE_URL_SYNC
              valueFrom:
                secretKeyRef:
                  name: mistudio-secrets
                  key: database-url-sync
            - name: REDIS_URL
              value: redis://redis:6379/0
            - name: CELERY_BROKER_URL
              value: redis://redis:6379/0
            - name: CELERY_RESULT_BACKEND
              value: redis://redis:6379/0
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: mistudio-secrets
                  key: secret-key
            # Deployment portability env vars
            - name: DATA_DIR
              value: /data
            - name: BACKEND_DIR
              value: /app
            - name: INTERNAL_API_URL
              value: http://mistudio-backend:8000
            - name: OLLAMA_URL
              value: http://ollama-proxy:11434
          volumeMounts:
            - name: mistudio-data
              mountPath: /data
      volumes:
        - name: mistudio-data
          hostPath:
            path: /data/mistudio/data
            type: DirectoryOrCreate

---
apiVersion: v1
kind: Service
metadata:
  name: mistudio-backend
  namespace: mistudio
spec:
  selector:
    app: mistudio-backend
  ports:
    - port: 8000

# -------------------------
# MCP SERVER (Feature 010 — agentic access, opt-in)
# Disable: kubectl -n mistudio scale deploy/mistudio-mcp --replicas=0
# No Ingress shipped — ClusterIP only; expose deliberately (port-forward or
# your own Ingress + TLS). Requires mcp-auth-token in mistudio-secrets.
# -------------------------
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mistudio-mcp
  namespace: mistudio
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mistudio-mcp
  template:
    metadata:
      labels:
        app: mistudio-mcp
    spec:
      containers:
        - name: mcp-server
          image: hitsai/mistudio-backend:latest
          command: ["python", "-m", "src.mcp_server"]
          ports:
            - containerPort: 8765
          env:
            - name: MISTUDIO_API_URL
              value: http://mistudio-backend:8000
            - name: MCP_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: mistudio-secrets
                  key: mcp-auth-token
            - name: MCP_TOOL_CATEGORIES
              value: "read,groups,steering,labeling,experiments,jobs"
            - name: MCP_STEERING_APPROVAL
              value: "false"
          readinessProbe:
            httpGet:
              path: /health
              port: 8765
            initialDelaySeconds: 10
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /health
              port: 8765
            initialDelaySeconds: 20
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: mistudio-mcp
  namespace: mistudio
spec:
  type: ClusterIP
  selector:
    app: mistudio-mcp
  ports:
    - port: 8765
---
# MCP ingress. Dedicated hosts mcp-mistudio.hitsai.{local,net} resolve on the
# LAN only (hosts file / local DNS) unless you publish the .net name in public
# DNS/Cloudflare yourself. Bearer auth applies either way.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mistudio-mcp-ingress
  namespace: mistudio
  annotations:
    # MCP streamable HTTP: long-lived responses + SSE streams
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  ingressClassName: public
  rules:
    # Path-based route on the shared miStudio host (kept for compatibility)
    - host: k8s-mistudio.hitsai.local
      http:
        paths:
          - path: /mcp
            pathType: Prefix
            backend:
              service:
                name: mistudio-mcp
                port:
                  number: 8765
    # Dedicated MCP hosts — full path space (/mcp for protocol, /health for checks).
    # LAN-resolved via /etc/hosts or local DNS; the .net name is NOT published in
    # public DNS/Cloudflare by default. Bearer auth enforced on every request.
    - host: mcp-mistudio.hitsai.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: mistudio-mcp
                port:
                  number: 8765
    - host: mcp-mistudio.hitsai.net
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: mistudio-mcp
                port:
                  number: 8765

# -------------------------
# FRONTEND
# -------------------------
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mistudio-frontend
  namespace: mistudio
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mistudio-frontend
  template:
    metadata:
      labels:
        app: mistudio-frontend
    spec:
      containers:
        - name: frontend
          image: hitsai/mistudio-frontend:latest
          ports:
            # nginx-unprivileged listens on 8080 by default so it doesn't need
            # CAP_NET_BIND_SERVICE.
            - containerPort: 8080

---
apiVersion: v1
kind: Service
metadata:
  name: mistudio-frontend
  namespace: mistudio
spec:
  selector:
    app: mistudio-frontend
  ports:
    # External clients (ingress) hit port 80; service forwards to the
    # container's non-privileged 8080.
    - port: 80
      targetPort: 8080

# -------------------------
# OLLAMA PROXY SERVICE (ExternalName to ollama namespace)
# -------------------------
---
apiVersion: v1
kind: Service
metadata:
  name: ollama-proxy
  namespace: mistudio
spec:
  type: ExternalName
  externalName: ollama-service.ollama.svc.cluster.local
  ports:
    - port: 11434

# -------------------------
# INGRESS (MICROK8S NGINX)
# -------------------------
# Note: WebSocket support requires specific annotations to handle the upgrade handshake.
# The /ws path is handled by a separate ingress to ensure clean WebSocket configuration.
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mistudio-ingress
  namespace: mistudio
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "0"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "3600"
spec:
  ingressClassName: public
  rules:
    - host: k8s-mistudio.hitsai.local
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: mistudio-backend
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: mistudio-frontend
                port:
                  number: 80
    - host: k8s-mistudio.hitsai.net
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: mistudio-backend
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: mistudio-frontend
                port:
                  number: 80

---
# Separate ingress for WebSocket to ensure proper upgrade handling
# Note: websocket-services annotation handles Upgrade/Connection headers automatically
# Do NOT add configuration-snippet with Upgrade headers - it causes header duplication
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mistudio-websocket-ingress
  namespace: mistudio
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "0"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "3600"
    nginx.ingress.kubernetes.io/websocket-services: "mistudio-backend"
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
spec:
  ingressClassName: public
  rules:
    - host: k8s-mistudio.hitsai.local
      http:
        paths:
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: mistudio-backend
                port:
                  number: 8000
    - host: k8s-mistudio.hitsai.net
      http:
        paths:
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: mistudio-backend
                port:
                  number: 8000

---
# Separate ingress for Ollama with path rewrite
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mistudio-ollama-ingress
  namespace: mistudio
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    nginx.ingress.kubernetes.io/proxy-body-size: "0"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
spec:
  ingressClassName: public
  rules:
    - host: k8s-mistudio.hitsai.local
      http:
        paths:
          - path: /ollama(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: ollama-proxy
                port:
                  number: 11434
    - host: k8s-mistudio.hitsai.net
      http:
        paths:
          - path: /ollama(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: ollama-proxy
                port:
                  number: 11434
